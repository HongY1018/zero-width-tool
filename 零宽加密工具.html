<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零宽字符加密工具</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            margin-bottom: 12px;
            outline: none;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 100px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #409eff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; }
        button.copy-btn { background: #67c23a; }
        button.reset-btn { background: #909399; }
        .tip {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h2>零宽字符加密工具</h2>
    <textarea id="input" placeholder="在此输入要加密的原文，比如 bai17555072523"></textarea>
    
    <div class="btn-group">
        <button onclick="encrypt()">一键加密</button>
        <button onclick="decrypt()">一键解密</button>
    </div>

    <textarea id="output" placeholder="加密/解密结果会显示在这里" readonly></textarea>
    
    <div class="btn-group">
        <button class="copy-btn" onclick="copyResult()">复制结果</button>
        <button class="reset-btn" onclick="resetAll()">清空全部</button>
    </div>

    <div class="tip">
        ✅ 加密原理：字符间隙插入多层隐形零宽Unicode符号，肉眼正常显示，复制后带乱码效果<br>
        ✅ 适用场景：抖音/微信留联系方式、规避敏感词检测、防文案复制搬运<br>
        ✅ 解密功能：粘贴乱码文本，点击解密即可还原纯原文
    </div>

    <script>
        // 零宽字符库（混合多种隐形字符，加密效果更强）
        const zeroWidthChars = [
            '\u200B', // 零宽空格
            '\u200C', // 零宽非连字
            '\u200D', // 零宽连字
            '\uFEFF', // 零宽非断空格
            '\u2060'  // 词连接符
        ];

        // 加密函数：每个字符间插入随机数量的零宽字符
        function encrypt() {
            const input = document.getElementById('input').value;
            if (!input) {
                alert('请先输入要加密的内容');
                return;
            }
            let result = '';
            for (let i = 0; i < input.length; i++) {
                result += input[i];
                // 每个字符后插入1~3个随机零宽字符
                const count = Math.floor(Math.random() * 3) + 1;
                for (let j = 0; j < count; j++) {
                    const randomChar = zeroWidthChars[Math.floor(Math.random() * zeroWidthChars.length)];
                    result += randomChar;
                }
            }
            document.getElementById('output').value = result;
        }

        // 解密函数：移除所有零宽字符，还原原文
        function decrypt() {
            const input = document.getElementById('input').value;
            if (!input) {
                alert('请先粘贴要解密的内容');
                return;
            }
            // 正则匹配所有零宽字符并移除
            const result = input.replace(/[\u200B-\u200D\uFEFF\u2060]/g, '');
            document.getElementById('output').value = result;
        }

        // 复制结果
        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) {
                alert('暂无内容可复制');
                return;
            }
            output.select();
            document.execCommand('copy');
            alert('已复制到剪贴板');
        }

        // 清空
        function resetAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
        }
    </script>
</body>
</html>
